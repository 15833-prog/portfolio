<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nopanan | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 🎨 โทนสีเขียวอะโวคาโด และ สีครีมมินิมอล */
        :root {
            --bg-cream: #faf7f0;       /* สีครีมพื้นหลังหลัก */
            --sidebar-cream: #f3edd7;  /* สีครีมเข้มขึ้นเล็กน้อยสำหรับแถบข้าง */
            --avocado-green: #557c24;  /* สีเขียวอะโวคาโดตามรูปภาพ */
            --text-dark: #2c3619;      /* สีตัวหนังสือเข้มโทนธรรมชาติ */
            --text-muted: #6b7556;    /* สีข้อความรอง */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif; /* เปลี่ยนเป็นฟอนต์ไทยอ่านง่าย */
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            display: table;
            width: 100%;
            min-height: 100vh;
        }

        /* 🚪 จัดโครงสร้างสไตล์ Sidebar Layout */
        .sidebar {
            display: table-cell;
            width: 280px;
            background-color: var(--sidebar-cream);
            padding: 40px 25px;
            vertical-align: top;
            border-right: 1px solid rgba(85, 124, 36, 0.1);
            height: 100vh;
            position: fixed; /* ตรึงเมนูไว้ฝั่งซ้ายตลอดเวลา */
        }

        .main-content {
            display: table-cell;
            padding: 60px 50px;
            vertical-align: top;
            padding-left: 330px; /* เว้นพื้นที่หลบแถบซ้ายที่โดน fixed ไว้ */
        }

        /* 🔳 รูปโปรไฟล์กรอบสี่เหลี่ยมตามบรีฟ (ซ้ายบน) */
        .profile-box {
            width: 100%;
            max-width: 230px;
            aspect-ratio: 1 / 1;
            background-color: #ffffff;
            border: 3px solid var(--avocado-green);
            border-radius: 4px; /* ทรงสี่เหลี่ยมคมชัด มินิมอล */
            overflow: hidden;
            margin-bottom: 35px;
            box-shadow: 0 8px 20px rgba(85, 124, 36, 0.1);
        }

        .profile-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 🧭 แถบเมนูอยู่ฝั่งซ้ายใต้รูปโปรไฟล์ */
        .nav-menu {
            display: block;
        }

        .nav-menu a {
            display: block;
            color: var(--text-dark);
            text-decoration: none;
            padding: 12px 18px;
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.25s ease;
            border-left: 3px solid transparent;
        }

        /* สถานะเมนูที่เปิดอยู่ หรือ ตอนชี้ */
        .nav-menu a.active, .nav-menu a:hover {
            background-color: var(--avocado-green);
            color: #ffffff;
            border-left: 3px solid var(--text-dark);
            padding-left: 22px;
        }

        /* 📄 การ์ดและเนื้อหาฝั่งขวา */
        .welcome-section {
            background: #ffffff;
            border: 1px solid rgba(85, 124, 36, 0.08);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(85, 124, 36, 0.03);
            max-width: 800px;
        }

        .welcome-section h1 {
            color: var(--avocado-green);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .welcome-section subtitle {
            display: block;
            color: var(--text-muted);
            font-size: 1.1rem;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .welcome-section p {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-dark);
            margin-bottom: 30px;
        }

        /* ปุ่มดีไซน์เขียวอะโวคาโด */
        .btn-explore {
            display: inline-block;
            background-color: var(--avocado-green);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 28px;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(85, 124, 36, 0.2);
            font-size: 1rem;
        }

        .btn-explore:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(85, 124, 36, 0.3);
            background-color: #44631c;
        }

        .btn-explore:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <!-- 🟢 ส่วนที่ 1: แถบ Sidebar ฝั่งซ้าย -->
    <div class="sidebar">
        <!-- รูปโปรไฟล์เหลี่ยมมุมมินิมอล (ซ้ายบน) -->
        <div class="profile-box">
            <!-- ⚠️ เปลี่ยนชื่อรูปภาพให้ตรงกับของนพอนันต์ตรง src ได้เลยนะครับ -->
            <img src="images/profile.jpg" alt="รูปโปรไฟล์นพอนันต์" onerror="this.src='https://via.placeholder.com/230/557c24/ffffff?text=Nopanan'">
        </div>

        <!-- แทบล็อกเมนูอยู่ใต้รูปโปรไฟล์ (ภาษาไทย) -->
        <nav class="nav-menu">
            <a href="index.html" class="active">หน้าแรก</a>
            <a href="personal.html">ประวัติส่วนตัว</a>
            <a href="projects.html">ผลงาน</a>
            <a href="hobbies.html">งานอดิเรก</a>
            <a href="contact.html">ติดต่อ</a>
        </nav>
    </div>

    <!-- ⚪ ส่วนที่ 2: เนื้อหาฝั่งขวา (ภาษาไทย) -->
    <div class="main-content">
        <div class="welcome-section">
            <h1>ยินดีต้อนรับสู่พื้นที่ของฉัน</h1>
            <subtitle>นพอนันต์ ทิจันทร์</subtitle>
            

            <a href="about.html" class="btn-explore">ทำความรู้จักฉันเพิ่มขึ้น</a>
        </div>
    </div>

</body>
</html>
